<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch | Explore Movies</title>
    <meta name="description"
        content="Discover movies, view details like genre and director, and explore cinema with CineSearch, powered by OMDB.">
    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="navbar">
        <div class="container navbar-content">
            <div class="logo" id="homeBtn" style="cursor: pointer;" title="Go to Home">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">CineSearch</span>
            </div>
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="Search movies (e.g., Inception)..." aria-label="Search movies">
                <button id="searchButton" class="search-button" aria-label="Execute search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            <div class="nav-actions">
                <select id="typeSelect" class="btn-nav" style="padding-right: 1.5rem;" title="Filter by type">
                    <option value="">All Types</option>
                    <option value="movie">Movies</option>
                    <option value="series">Series</option>
                    <option value="episode">Episodes</option>
                </select>
                <button id="favoritesBtn" class="btn-nav" aria-label="View Favorites">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>
                    <span>Favorites</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container main-content">
        <!-- Controls area: shown when there are results -->
        <section class="controls" id="controlsSection" style="display: none;">
            <div class="results-count" id="resultsCount"></div>
            <div class="sort-wrapper">
                <label for="sortSelect" style="margin-left: 0.5rem;">Sort:</label>
                <select id="sortSelect" class="sort-select">
                    <option value="default">Default</option>
                    <option value="year-desc">Year (Newest)</option>
                    <option value="year-asc">Year (Oldest)</option>
                </select>
            </div>
        </section>

        <!-- Status area for empty state, errors, or loading -->
        <section class="status-area" id="statusArea">
            <div class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                    class="empty-icon">
                    <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                    <line x1="7" y1="2" x2="7" y2="22"></line>
                    <line x1="17" y1="2" x2="17" y2="22"></line>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <line x1="2" y1="7" x2="7" y2="7"></line>
                    <line x1="2" y1="17" x2="7" y2="17"></line>
                    <line x1="17" y1="17" x2="22" y2="17"></line>
                    <line x1="17" y1="7" x2="22" y2="7"></line>
                </svg>
                <h2>Welcome to CineSearch</h2>
                <p>Type a movie name above to start exploring.</p>
            </div>
        </section>

        <!-- Home View (Popular Movies & Series) -->
        <section class="home-view" id="homeView" style="display: none; width: 100%;">
            <div class="home-section">
                <h2 style="margin-bottom: 1rem; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #ef4444;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    Trending Movies
                </h2>
                <div class="movie-grid" id="popularMoviesGrid"></div>
            </div>
            <div class="home-section" style="margin-top: 3rem;">
                <h2 style="margin-bottom: 1rem; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-color);"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
                    Trending Series
                </h2>
                <div class="movie-grid" id="popularSeriesGrid"></div>
            </div>
        </section>

        <!-- Search/Favorites Results Grid -->
        <section class="movie-grid" id="movieGrid"></section>
    </main>

    <!-- Movie Details Modal -->
    <div class="modal-backdrop" id="movieModal" aria-hidden="true">
        <div class="modal-container">
            <button class="modal-close" id="modalCloseBtn" aria-label="Close modal">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-content" id="modalContent">
                <!-- Modal content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="container">
            <p><strong>CineSearch</strong> - OMDB Movie Search Project</p>
            <p>Developed by <a href="https://github.com/TasanSerhat" target="_blank" rel="noopener noreferrer">Serhat
                    Talha
                    Tasan</a></p>
            <p style="font-size: 0.75rem; margin-top: 1rem; color: var(--card-border);">Powered by <a
                    href="http://www.omdbapi.com/" target="_blank">OMDb API</a></p>
        </div>
    </footer>

    <!-- Application Script as Module -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
